version: "3.8"

services:
  mongo:
    image: mongo:4.4
    container_name: mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # One-time job to initialise the replica set
  mongo-init:
    image: mongo:4.4
    container_name: mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command: >
      bash -c "
        echo 'Initialising replica set...'
        mongo --host mongo:27017 --eval \"
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongo:27017' }]
          })
        \"
        echo 'Done!'
      "

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/app?replicaSet=rs0&directConnection=true
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
