apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: 3-tier-ns
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: "mongo"
  replicas: 1          # Single replica for local Docker Desktop
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        replicaset: rs0.main
    spec:
      containers:
      - name: mongo
        image: mongo:4.4   # 4.4 works better on modern kernels than 4.2
        command:
        - "mongod"
        - "--wiredTigerCacheSizeGB"
        - "0.25"
        - "--bind_ip"
        - "0.0.0.0"
        - "--replSet"
        - "rs0"
        ports:
        - containerPort: 27017
        readinessProbe:
          exec:
            command:
            - mongo
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: mg-pv-cont
          mountPath: /data/db
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: mg-pv-cont
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: 3-tier-ns
  labels:
    app: mongo
spec:
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
  selector:
    app: mongo
